{{- if .Values.models }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "llamacpp.fullname" . }}-model-loader
  labels:
    {{- include "llamacpp.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-loader
  annotations:
    "helm.sh/hook":               post-install,post-upgrade
    "helm.sh/hook-weight":        "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.modelDownloadBackoffLimit | default 3 }}
  activeDeadlineSeconds: {{ mul (len .Values.models) (.Values.modelTimeoutSeconds | default 3600) }}
  template:
    metadata:
      labels:
        {{- include "llamacpp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: model-loader
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: model-loader
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/download.sh"]
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: scripts
              mountPath: /scripts

          resources:
            {{- toYaml .Values.jobResources | nindent 12 }}

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ include "llamacpp.fullname" . }}-pvc
        - name: scripts
          configMap:
            name: {{ include "llamacpp.fullname" . }}-model-loader-script
            defaultMode: 0755
{{- end }}